<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
    #v { width: 100%; height: 100%; object-fit: contain; background: #000; }
    #status {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-family: sans-serif; font-size: 22px;
      pointer-events: none; text-align: center; padding: 0 24px;
    }
    #dbg {
      position: fixed; left: 8px; bottom: 8px; z-index: 10;
      color: #5f5; font-family: monospace; font-size: 14px;
      white-space: pre-line; pointer-events: none;
    }
    #stat {
      position: fixed; right: 8px; bottom: 8px; z-index: 10;
      color: #5cf; font-family: monospace; font-size: 14px;
      white-space: pre-line; text-align: right; pointer-events: none;
    }
  </style>
</head>
<body>
  <video id="v" autoplay playsinline muted></video>
  <audio id="a" autoplay playsinline></audio>
  <div id="status">Connecting…</div>
  <div id="dbg"></div>
  <div id="stat"></div>
  <script>
    let pc;
    let statsTimer = null;
    let retries = 0;
    let videoStream = new MediaStream();
    let audioStream = new MediaStream();
    const MAX_RETRIES = 3;

    function setStatus(s) {
      const el = document.getElementById('status');
      el.textContent = s;
      el.style.display = s ? 'flex' : 'none';
    }

    // On-screen diagnostics (also mirrored to logcat via the bridge).
    function dbg(msg) {
      document.getElementById('dbg').textContent += msg + '\n';
      AndroidBridge.log(msg);
    }

    // Nest does not support trickle ICE — gather all candidates, then send the
    // full offer. Fall back after a short timeout if gathering stalls.
    function waitIceComplete() {
      return new Promise((resolve) => {
        if (pc.iceGatheringState === 'complete') return resolve();
        const check = () => {
          if (pc.iceGatheringState === 'complete') {
            pc.removeEventListener('icegatheringstatechange', check);
            resolve();
          }
        };
        pc.addEventListener('icegatheringstatechange', check);
        setTimeout(resolve, 3000);
      });
    }

    // Poll inbound RTP stats so we can see whether audio packets actually arrive.
    // If audio pkts climb but you hear nothing → output/volume issue, not the stream.
    // If audio pkts stay 0 → the doorbell isn't sending audio (mic off / inactive).
    function startStats() {
      if (statsTimer) clearInterval(statsTimer);
      statsTimer = setInterval(async () => {
        if (!pc) return;
        let a = null, v = null;
        (await pc.getStats()).forEach((r) => {
          if (r.type === 'inbound-rtp' && r.kind === 'audio') a = r;
          if (r.type === 'inbound-rtp' && r.kind === 'video') v = r;
        });
        document.getElementById('stat').textContent =
          'audio pkts ' + (a ? a.packetsReceived : 'n/a') + '\n' +
          'video pkts ' + (v ? v.packetsReceived : 'n/a') + '\n' +
          'audio paused ' + document.getElementById('a').paused + '\n' +
          'audio muted ' + document.getElementById('a').muted;
      }, 1000);
    }

    async function start() {
      try {
        pc = new RTCPeerConnection({
          iceServers: [{ urls: 'stun:stun.l.google.com:19302' }],
        });
        startStats();

        // Nest requires the offer's m-lines in this exact order and direction:
        //   audio (recvonly), video (recvonly), application (data channel).
        // The SDM REST API is receive-only — it rejects sendrecv audio, so
        // two-way talk is not possible here (it needs the Home APIs SDK + GMS).
        // We still RECEIVE the doorbell's audio, so you can hear the visitor.
        pc.addTransceiver('audio', { direction: 'recvonly' });
        pc.addTransceiver('video', { direction: 'recvonly' });
        pc.createDataChannel('dataSendChannel');

        pc.ontrack = (e) => {
          // Show each track's kind so we can see whether audio is arriving.
          dbg('track: ' + e.track.kind);
          if (e.track.kind === 'video') {
            const v = document.getElementById('v');
            videoStream.addTrack(e.track);
            if (v.srcObject !== videoStream) v.srcObject = videoStream;
            setStatus('');
          } else if (e.track.kind === 'audio') {
            const a = document.getElementById('a');
            audioStream.addTrack(e.track);
            if (a.srcObject !== audioStream) a.srcObject = audioStream;
            a.muted = false;
            a.volume = 1.0;
            a.play().then(() => dbg('audio play ok')).catch((err) => {
              dbg('audio play err: ' + err);
            });
          }
        };
        pc.oniceconnectionstatechange = () => dbg('ice: ' + pc.iceConnectionState);
        pc.onconnectionstatechange = () => {
          dbg('conn: ' + pc.connectionState);
          if (pc.connectionState === 'connected') {
            retries = 0;
            // Connection is up — ask the activity to route audio to the speaker.
            AndroidBridge.onConnected();
          } else if (pc.connectionState === 'failed') {
            reconnect();
          }
        };

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        await waitIceComplete();
        AndroidBridge.onOfferReady(pc.localDescription.sdp);
      } catch (err) {
        AndroidBridge.onError('' + err);
      }
    }

    function teardown() {
      if (statsTimer) { clearInterval(statsTimer); statsTimer = null; }
      if (pc) { try { pc.close(); } catch (e) {} pc = null; }
      videoStream = new MediaStream();
      audioStream = new MediaStream();
    }

    // Nest WebRTC sessions are time-limited and the network can drop; re-establish
    // a fresh stream (new offer → new SDM session) up to a few times.
    function reconnect() {
      teardown();
      if (retries >= MAX_RETRIES) {
        setStatus('Connection lost');
        return;
      }
      retries++;
      setStatus('Reconnecting… (' + retries + '/' + MAX_RETRIES + ')');
      AndroidBridge.onReconnect(); // let the activity stop the stale session
      setTimeout(start, 1500);
    }

    // Called from Kotlin with the SDM answer SDP.
    async function setAnswer(sdp) {
      try {
        await pc.setRemoteDescription({ type: 'answer', sdp: sdp });
        // Report what the answer actually grants us — does it include audio?
        const kinds = pc.getReceivers()
          .map((r) => r.track && r.track.kind)
          .filter(Boolean);
        dbg('answer tracks: ' + (kinds.join(', ') || 'none'));
        // Does the answer SDP even contain a receivable audio line?
        dbg('answer has m=audio: ' + /m=audio/.test(sdp));
      } catch (err) {
        AndroidBridge.onError('answer: ' + err);
      }
    }

    window.onload = () => {
      start();
    };
  </script>
</body>
</html>
