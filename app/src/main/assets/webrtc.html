<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
    #v { width: 100%; height: 100%; object-fit: contain; background: #000; }
    #status {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-family: sans-serif; font-size: 22px;
      pointer-events: none; text-align: center; padding: 0 24px;
    }
  </style>
</head>
<body>
  <video id="v" autoplay playsinline muted></video>
  <div id="status">Connecting…</div>
  <script>
    let pc;

    function setStatus(s) {
      const el = document.getElementById('status');
      el.textContent = s;
      el.style.display = s ? 'flex' : 'none';
    }

    // Nest does not support trickle ICE — gather all candidates, then send the
    // full offer. Fall back after a short timeout if gathering stalls.
    function waitIceComplete() {
      return new Promise((resolve) => {
        if (pc.iceGatheringState === 'complete') return resolve();
        const check = () => {
          if (pc.iceGatheringState === 'complete') {
            pc.removeEventListener('icegatheringstatechange', check);
            resolve();
          }
        };
        pc.addEventListener('icegatheringstatechange', check);
        setTimeout(resolve, 3000);
      });
    }

    async function start() {
      try {
        pc = new RTCPeerConnection({
          iceServers: [{ urls: 'stun:stun.l.google.com:19302' }],
        });
        // View-only: receive audio + video, send nothing.
        pc.addTransceiver('audio', { direction: 'recvonly' });
        pc.addTransceiver('video', { direction: 'recvonly' });
        // Nest requires a data channel to be present in the offer.
        pc.createDataChannel('dataSendChannel');

        pc.ontrack = (e) => {
          const v = document.getElementById('v');
          if (e.streams && e.streams[0] && v.srcObject !== e.streams[0]) {
            v.srcObject = e.streams[0];
            // Unmute once we actually have media (autoplay needs muted to start).
            v.muted = false;
            setStatus('');
          }
        };
        pc.onconnectionstatechange = () => {
          AndroidBridge.log('connection: ' + pc.connectionState);
          if (pc.connectionState === 'failed') setStatus('Connection failed');
        };

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        await waitIceComplete();
        AndroidBridge.onOfferReady(pc.localDescription.sdp);
      } catch (err) {
        AndroidBridge.onError('' + err);
      }
    }

    // Called from Kotlin with the SDM answer SDP.
    async function setAnswer(sdp) {
      try {
        await pc.setRemoteDescription({ type: 'answer', sdp: sdp });
      } catch (err) {
        AndroidBridge.onError('answer: ' + err);
      }
    }

    window.onload = start;
  </script>
</body>
</html>
